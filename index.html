<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #fdf6ec;

    --primary: #e07a3f;
    --primary-dark: #c9642c;
    --accent: #2f7d6d;
    --text: #2d2a26;
    --muted: #7a7369;
    --tag-bg: #f3e9db;
    --shadow: 0 4px 18px rgba(45, 42, 38, 0.10);
  }

  body {
    font-family: "Segoe UI", "Assistant", "Arial Hebrew", Arial, sans-serif;
    background: linear-gradient(160deg, #fdf6ec 0%, #f9e8d2 60%, #f5dcc0 100%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  header { text-align: center; margin-bottom: 24px; max-width: 640px; }
  header h1 { font-size: 1.9rem; margin-bottom: 8px; }
  header p { color: var(--muted); font-size: 1.05rem; }

  .container { width: 100%; max-width: 640px; }

  .card {
    background: var(--card);
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding: 24px;
    margin-bottom: 16px;
    animation: pop .35s ease;
  }
  @keyframes pop {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .card { animation: none; }
  }

  .progress {
    height: 8px; background: var(--tag-bg);
    border-radius: 99px; overflow: hidden; margin-bottom: 20px;
  }
  .progress > div {
    height: 100%; background: var(--primary);
    border-radius: 99px; transition: width .3s ease;
  }

  .question h2 { font-size: 1.3rem; margin-bottom: 16px; }

  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 480px) { .options { grid-template-columns: 1fr; } }

  .option-btn {
    border: 2px solid var(--tag-bg);
    background: #fffdf9;
    border-radius: 14px;
    padding: 16px 12px;
    font-size: 1.05rem;
    font-family: inherit;
    cursor: pointer;
    text-align: center;
    transition: border-color .15s ease, transform .15s ease;
    color: var(--text);
  }
  .option-btn .emoji { display: block; font-size: 1.8rem; margin-bottom: 6px; }
  .option-btn:hover { border-color: var(--primary); transform: translateY(-2px); }
  .option-btn:focus-visible { outline: 3px solid var(--primary); outline-offset: 2px; }
  .option-btn:active { transform: scale(.97); }

  .custom-city { margin-top: 14px; display: flex; gap: 8px; }
  .custom-city input {
    flex: 1;
    border: 2px solid var(--tag-bg);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 1rem;
    font-family: inherit;
    background: #fffdf9;
    color: var(--text);
  }
  .custom-city input:focus { outline: none; border-color: var(--primary); }

  .back-link {
    background: none; border: none; color: var(--muted);
    font-family: inherit; font-size: .95rem; cursor: pointer;
    margin-top: 14px; text-decoration: underline;
  }

  /* results */
  .result-header { text-align: center; margin-bottom: 18px; }
  .result-header h2 { font-size: 1.4rem; margin-bottom: 6px; }
  .result-header p { color: var(--muted); }

  .place {
    display: flex; gap: 14px; align-items: flex-start;
    border: 1.5px solid var(--tag-bg);
    border-radius: 16px; padding: 16px; margin-bottom: 12px;
    background: #fffdf9;
  }
  .place .icon {
    font-size: 2rem; background: var(--tag-bg);
    border-radius: 12px; width: 56px; height: 56px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .place h3 { font-size: 1.15rem; margin-bottom: 4px; }
  .place .desc { color: var(--muted); font-size: .95rem; line-height: 1.5; margin-bottom: 8px; }
  .place .tip {
    font-size: .88rem; color: var(--accent);
    background: #e8f3f0; border-radius: 8px; padding: 6px 10px;
    display: inline-block; margin-bottom: 8px;
  }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    background: var(--tag-bg); color: #6b5b45;
    font-size: .8rem; padding: 3px 10px; border-radius: 99px;
  }
  .maps-link {
    display: inline-block; margin-top: 8px; font-size: .9rem;
    color: var(--primary-dark); text-decoration: none; font-weight: 600;
  }
  .maps-link:hover { text-decoration: underline; }

  .actions { display: flex; gap: 12px; justify-content: center; margin-top: 18px; flex-wrap: wrap; }
  .btn {
    font-family: inherit; font-size: 1rem; font-weight: 600;
    border: none; border-radius: 12px; padding: 12px 22px; cursor: pointer;
    transition: background .15s ease;
  }
  .btn:focus-visible { outline: 3px solid var(--primary); outline-offset: 2px; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-secondary { background: var(--tag-bg); color: var(--text); }
  .btn-secondary:hover { background: #eaddc9; }

  footer { margin-top: 24px; color: var(--muted); font-size: .85rem; text-align: center; max-width: 640px; }
</style>

      render();
    });
  });

  const input = document.getElementById("city-input");
  const go = () => {
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    state.city = "custom";
    state.cityLabel = name;
    state.step = 0; state.answers = {};
    render();
  };
  document.getElementById("city-go").addEventListener("click", go);
  input.addEventListener("keydown", e => { if (e.key === "Enter") go(); });
}

function renderQuestion() {
  const q = QUESTIONS[state.step];
  const pct = ((state.step + 1) / (QUESTIONS.length + 1)) * 100;
  app.innerHTML = `
    <div class="card question">
      <div class="progress"><div style="width:${pct}%"></div></div>
      <h2>${q.text}</h2>
      <div class="options">
        ${q.options.map(o => `
          <button class="option-btn" data-value="${o.value}">
            <span class="emoji">${o.emoji}</span>${o.label}
          </button>`).join("")}
      </div>
      <button class="back-link" id="back">→ חזרה ${state.step > 0 ? "לשאלה הקודמת" : "לבחירת עיר"}</button>
    </div>`;

  app.querySelectorAll(".option-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      state.answers[q.key] = btn.dataset.value;
      state.step++;
      render();
    });
  });
  document.getElementById("back").addEventListener("click", () => {
    if (state.step > 0) state.step--;
    else { state.city = null; state.cityLabel = ""; }
    render();
  });
}

function currentPlaces() {
  if (state.city === "custom") {
    return GENERIC_PLACES.map(p => ({
      ...p,
      query: `${p.query} ${state.cityLabel}`,
    }));
  }
  return PLACES_BY_CITY[state.city];
}

function scorePlace(p) {
  const a = state.answers;
  let score = 0;
  if (p.who.includes(a.who)) score += 3; else return -1;
  if (p.vibe.includes(a.vibe)) score += 3;
  if (a.setting === "any" || p.setting === a.setting) score += 2;
  if (a.budget === "any") score += 1;
  else if (a.budget === "free" && p.budget === 0) score += 2;
  else if (a.budget === "low" && p.budget <= 1) score += 2;
  else if (a.budget !== "any" && p.budget === 2) score -= 2;
  return score;
}

function renderResults() {
  const radius = Number(state.answers.radius || 99);
  const scored = currentPlaces()
    .filter(p => p.km <= radius)
    .map(p => ({ p, s: scorePlace(p) }))
    .filter(x => x.s >= 0)
    .sort((a, b) => b.s - a.s);

  if (scored.length === 0) {
    app.innerHTML = `
      <div class="card">
        <div class="result-header">
          <h2>🔍 לא מצאנו התאמה ברדיוס הזה</h2>
          <p>נסו להגדיל את הרדיוס או לשנות את התשובות</p>
        </div>
        <div class="actions">
          <button class="btn btn-primary" id="widen">🛣️ הרחיבו את הרדיוס</button>
          <button class="btn btn-secondary" id="restart">🔄 עיר או חיפוש חדש</button>
        </div>
      </div>`;
    document.getElementById("widen").addEventListener("click", () => {
      state.answers.radius = "99";
      renderResults();
    });
    document.getElementById("restart").addEventListener("click", resetAll);
    return;
  }

  const top = scored.slice(0, 3).map(x => x.p);
  const genericNote = state.city === "custom"
    ? `<p>הצעות כלליות ל${escapeHTML(state.cityLabel)} — קישורי המפות ימצאו את המקומות הקרובים</p>`
    : `<p>נבחרו במיוחד לפי התשובות שלכם</p>`;

  app.innerHTML = `
    <div class="card">
      <div class="result-header">
        <h2>✨ הצעות לשישי בבוקר ב${escapeHTML(state.cityLabel)}</h2>
        ${genericNote}
      </div>
      ${top.map(placeHTML).join("")}
      <div class="actions">
        <button class="btn btn-primary" id="surprise">🎲 הפתיעו אותי</button>
        <button class="btn btn-secondary" id="restart">🔄 עיר או חיפוש חדש</button>
      </div>
    </div>`;

  document.getElementById("restart").addEventListener("click", resetAll);
  document.getElementById("surprise").addEventListener("click", renderSurprise);
}

function renderSurprise() {
  const radius = Number(state.answers.radius || 99);
  const inRadius = currentPlaces().filter(p => p.km <= radius);
  const places = inRadius.length ? inRadius : currentPlaces();
  const pick = places[Math.floor(Math.random() * places.length)];
  app.innerHTML = `
    <div class="card">
      <div class="result-header">
        <h2>🎲 ההגרלה בחרה בשבילכם ב${escapeHTML(state.cityLabel)}:</h2>
      </div>
      ${placeHTML(pick)}
      <div class="actions">
        <button class="btn btn-primary" id="surprise-again">🎲 עוד פעם</button>
        <button class="btn btn-secondary" id="restart2">🔄 עיר או חיפוש חדש</button>
      </div>
    </div>`;
  document.getElementById("surprise-again").addEventListener("click", renderSurprise);
  document.getElementById("restart2").addEventListener("click", resetAll);
}

function resetAll() {
  state.city = null; state.cityLabel = "";
  state.step = 0; state.answers = {};
  render();
}

function escapeHTML(s) {
  return s.replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
  }[c]));
}

function placeHTML(p) {
  const budgetTag = p.budget === 0 ? "חינם" : p.budget === 1 ? "עלות סמלית" : "בתשלום";
  const settingTag = p.setting === "outdoor" ? "בחוץ" : "בפנים";
  const mapsURL = "https://www.google.com/maps/search/" + encodeURIComponent(p.query);
  return `
    <div class="place">
      <div class="icon">${p.icon}</div>
      <div>
        <h3>${escapeHTML(p.name)}</h3>
        <p class="desc">${escapeHTML(p.desc)}</p>
        <span class="tip">💡 ${escapeHTML(p.tip)}</span>
        <div class="tags">
          <span class="tag">${budgetTag}</span>
          <span class="tag">${settingTag}</span>
          <span class="tag">📍 ~${p.km} ק"מ מהמרכז</span>
        </div>
        <a class="maps-link" href="${mapsURL}" target="_blank" rel="noopener">📍 פתיחה במפות</a>
      </div>
    </div>`;
}

render();
</script>
</body>
</html>
