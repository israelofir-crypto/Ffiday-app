name: Deploy to GitHub Pages

# The Pages site is served from the gh-pages branch (the GitHub token
# available to workflows cannot enable Pages via the deploy-pages API,
# so the site was bootstrapped by creating gh-pages, which GitHub
# auto-detects). This workflow keeps gh-pages in sync with main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync main to gh-pages
        run: git push --force origin HEAD:gh-pages
